<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio website</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <a href="#" class="logo">
            <span>Prependra Singh</span>
        </a>

        <ul class="nav-links">
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#experience">Experience</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <i class="fa-solid fa-bars" id="menu-icon"></i>

        <a href="https://github.com/prependrasingh" target="_blank">
            <button class="visit-btn">Visit GitHub</button>
        </a>
    </header>

    <!-- About Section -->
    <section id="about" class="about">
        <div class="about-container">

            <img src="profile.jpg" alt="Profile Image" class="profile-image">

            <div class="info-box">

                <div class="text">
                    <h3>Hi, I'm</h3>
                    <h1>Prependra Singh</h1>
                    <span>Backend Developer</span>
                </div>

                <div class="btn-group">
                    <div class="btn">Download CV</div>
                    <div class="btn">Contact</div>
                </div>

                <div class="socials">
                    <a href="https://github.com/prependrasingh" target="_blank">
                        <i class="fa-brands fa-github"></i>
                    </a>

                    <a href="https://www.linkedin.com/in/prependrasingh" target="_blank">
                        <i class="fa-brands fa-linkedin"></i>
                    </a>

                    <a href="https://www.instagram.com/prependrasingh" target="_blank">
                        <i class="fa-brands fa-square-instagram"></i>
                    </a>
                </div>

            </div>
        </div>
    </section>

    <section id="experience" class="experience">
        <h2 class="section-title">Experience</h2>


        <div class="experience-info">

            <div class="grid">
                <div class="grid-card">

                    <span>FrontEnd Developer</span>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
